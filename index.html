<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Planner Semanal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FDFBF8; /* Um tom de creme bem claro */
            color: #5D5550; /* Marrom aconchegante */
        }
        .cozy-title {
            font-family: 'Caveat', cursive;
        }
        /* Estilo para a barra de rolagem */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #F0EBE3; /* Fundo da barra de rolagem */
        }
        ::-webkit-scrollbar-thumb {
            background: #D4C8BE; /* Cor do "polegar" da barra de rolagem */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #BFB2A7;
        }
        .editable-area {
            transition: all 0.2s ease-in-out;
        }
        .editable-area:focus {
            outline: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            border-color: #A9998D; /* Borda um pouco mais escura ao focar */
            transform: scale(1.01);
        }
        /* Placeholder customizado para divs editáveis */
        [contenteditable="true"]:empty:before {
            content: attr(placeholder);
            pointer-events: none;
            display: block; /* Para o placeholder funcionar */
            color: #A9998D;
        }
    </style>
</head>
<body class="antialiased">
    <div id="app" class="container mx-auto p-4 sm:p-6 md:p-8">
        <header class="text-center mb-8">
            <h1 class="cozy-title text-5xl md:text-7xl text-[#6B5B4B]">Meu Planner Semanal</h1>
            <p class="text-lg text-stone-500 mt-2">Organize seus dias, metas e anotações com um toque aconchegante.</p>
        </header>

        <main>
            <!-- Quadro da Rotina Semanal -->
            <div id="routine-board" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-7 gap-4 mb-12">
                <!-- Os dias da semana serão gerados pelo JavaScript -->
            </div>

            <!-- Seções Adicionais -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <h2 class="cozy-title text-4xl text-[#6B5B4B] mb-4 text-center md:text-left">Anotações Gerais</h2>
                    <div id="notes-area" contenteditable="true" placeholder="Escreva suas anotações aqui..." class="editable-area w-full h-72 bg-stone-100 p-4 rounded-lg shadow-inner border border-stone-200 focus:ring-2 focus:ring-amber-200 overflow-y-auto"></div>
                </div>
                <div>
                    <h2 class="cozy-title text-4xl text-[#6B5B4B] mb-4 text-center md:text-left">Metas da Semana</h2>
                    <div id="goals-area" contenteditable="true" placeholder="Defina suas metas para a semana..." class="editable-area w-full h-72 bg-stone-100 p-4 rounded-lg shadow-inner border border-stone-200 focus:ring-2 focus:ring-amber-200 overflow-y-auto"></div>
                </div>
            </div>
        </main>
        
        <footer class="text-center mt-12">
            <button id="clear-button" class="bg-amber-200 hover:bg-amber-300 text-stone-700 font-semibold py-2 px-6 rounded-lg shadow-md transition-transform transform hover:scale-105">
                Limpar Planner
            </button>
        </footer>
    </div>
    
    <!-- Modal de Confirmação -->
    <div id="confirmation-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-[#FDFBF8] p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center">
            <h2 class="text-2xl font-bold text-stone-700 mb-4">Tem certeza?</h2>
            <p class="text-stone-600 mb-6">Todo o seu planner será apagado. Esta ação não pode ser desfeita.</p>
            <div class="flex justify-center gap-4">
                <button id="cancel-clear" class="bg-stone-200 hover:bg-stone-300 text-stone-700 font-semibold py-2 px-6 rounded-lg transition">Cancelar</button>
                <button id="confirm-clear" class="bg-red-300 hover:bg-red-400 text-white font-semibold py-2 px-6 rounded-lg transition">Apagar</button>
            </div>
        </div>
    </div>


    <script type="module">
        // Importações do Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Configuração e Variáveis Globais ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-planner-app';
        
        let app, auth, db;
        let userId = null;
        let routineDocRef = null;
        let notesDocRef = null;
        
        const daysOfWeek = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado", "Domingo"];
        const dayPrefixes = ["seg", "ter", "qua", "qui", "sex", "sab", "dom"];

        const board = document.getElementById('routine-board');
        const notesArea = document.getElementById('notes-area');
        const goalsArea = document.getElementById('goals-area');
        const clearButton = document.getElementById('clear-button');
        const modal = document.getElementById('confirmation-modal');
        const confirmClearBtn = document.getElementById('confirm-clear');
        const cancelClearBtn = document.getElementById('cancel-clear');

        // --- Funções Principais ---

        function initializeAppAndListeners() {
            try {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                setupAuthListener();
            } catch (error) {
                console.error("Erro ao inicializar o Firebase:", error);
                board.innerHTML = `<p class="text-center col-span-full text-red-500">Não foi possível conectar ao serviço de dados. Tente recarregar a página.</p>`;
            }
        }
        
        function setupAuthListener() {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    userId = user.uid;
                    routineDocRef = doc(db, `artifacts/${appId}/users/${userId}/routine`);
                    notesDocRef = doc(db, `artifacts/${appId}/users/${userId}/notes`);
                    loadData();
                } else {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Erro na autenticação:", error);
                    }
                }
            });
        }
        
        // Gera o quadro na tela
        function createBoard() {
            daysOfWeek.forEach((day, index) => {
                const dayPrefix = dayPrefixes[index];
                const dayColumn = document.createElement('div');
                dayColumn.className = 'flex flex-col gap-3 bg-stone-100 p-3 rounded-lg shadow-sm';
                dayColumn.innerHTML = `<h2 class="font-bold text-center text-lg text-stone-600 pb-2 border-b-2 border-stone-200">${day}</h2>`;

                // Horários
                for (let i = 7; i <= 21; i++) {
                    const timeSlotWrapper = document.createElement('div');
                    timeSlotWrapper.className = 'flex items-center gap-2';

                    const timeLabel = document.createElement('span');
                    timeLabel.className = 'text-xs text-stone-500 font-semibold';
                    timeLabel.textContent = `${i.toString().padStart(2, '0')}:00`;

                    const slot = document.createElement('div');
                    slot.id = `${dayPrefix}-${i}`;
                    slot.contentEditable = true;
                    slot.className = 'editable-area flex-grow bg-white p-1.5 rounded-md border border-stone-200 text-sm min-h-[30px]';
                    slot.setAttribute('placeholder', '...');
                    slot.addEventListener('blur', () => saveContent(routineDocRef, slot.id, slot.innerHTML));
                    
                    timeSlotWrapper.appendChild(timeLabel);
                    timeSlotWrapper.appendChild(slot);
                    dayColumn.appendChild(timeSlotWrapper);
                }

                // Observações
                const obsTitle = document.createElement('h3');
                obsTitle.className = "font-semibold text-center text-md text-stone-600 pt-2 border-t-2 border-stone-200 mt-2";
                obsTitle.textContent = "Obs.";
                
                const obsArea = document.createElement('div');
                obsArea.id = `obs-${dayPrefix}`;
                obsArea.contentEditable = true;
                obsArea.className = 'editable-area bg-white p-2 rounded-md border border-stone-200 text-sm min-h-[60px]';
                obsArea.setAttribute('placeholder', 'Observações...');
                obsArea.addEventListener('blur', () => saveContent(routineDocRef, obsArea.id, obsArea.innerHTML));

                dayColumn.appendChild(obsTitle);
                dayColumn.appendChild(obsArea);
                board.appendChild(dayColumn);
            });
        }
        
        // Carrega todos os dados do Firestore
        async function loadData() {
            if (routineDocRef) {
                try {
                    const docSnap = await getDoc(routineDocRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        Object.keys(data).forEach(id => {
                            const element = document.getElementById(id);
                            if (element) element.innerHTML = data[id];
                        });
                    }
                } catch (error) { console.error("Erro ao carregar rotina:", error); }
            }
            if (notesDocRef) {
                 try {
                    const docSnap = await getDoc(notesDocRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if(data.notes) notesArea.innerHTML = data.notes;
                        if(data.goals) goalsArea.innerHTML = data.goals;
                    }
                } catch (error) { console.error("Erro ao carregar anotações:", error); }
            }
        }
        
        // Salva o conteúdo em um documento específico
        async function saveContent(docRef, id, content) {
            if (!docRef) return;
            try {
                await setDoc(docRef, { [id]: content }, { merge: true });
            } catch (error) {
                console.error(`Erro ao salvar conteúdo:`, error);
            }
        }

        // Limpa o planner na UI e no Firestore
        async function clearPlanner() {
            document.querySelectorAll('.editable-area').forEach(el => el.innerHTML = '');
            
            if (routineDocRef) await deleteDoc(routineDocRef).catch(e => console.error(e));
            if (notesDocRef) await deleteDoc(notesDocRef).catch(e => console.error(e));

            console.log("Planner limpo com sucesso.");
            closeModal();
        }

        // --- Funções do Modal ---
        function showModal() { modal.classList.remove('hidden'); }
        function closeModal() { modal.classList.add('hidden'); }

        // --- Listeners de Eventos Globais ---
        clearButton.addEventListener('click', showModal);
        cancelClearBtn.addEventListener('click', closeModal);
        confirmClearBtn.addEventListener('click', clearPlanner);
        notesArea.addEventListener('blur', () => saveContent(notesDocRef, 'notes', notesArea.innerHTML));
        goalsArea.addEventListener('blur', () => saveContent(notesDocRef, 'goals', goalsArea.innerHTML));


        // --- Inicialização ---
        createBoard();
        initializeAppAndListeners();

    </script>
</body>
</html>
